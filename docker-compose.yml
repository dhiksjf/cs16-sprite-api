version: '3.8'

services:
  sprite-api:
    build: .
    container_name: cs16-sprite-api
    ports:
      - "8000:8000"
    volumes:
      # Mount outputs directory to persist generated sprites
      - ./outputs:/app/outputs
      # Mount temp directory for video processing
      - ./temp:/app/temp
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
